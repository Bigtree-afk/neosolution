# 네오 소비지수(NCI) 가중치 설정
# NCI = weighted_sum(components) / sum(weights)

nci_components:
  retail_sales_index:
    name: 소매판매액지수
    weight: 0.35
    source: kosis
    normalization:
      baseline: 100     # 기준값 (2020=100)
      min_nci: 0
      max_nci: 100

  consumer_sentiment:
    name: 소비자심리지수(CSI)
    weight: 0.30
    source: bok
    normalization:
      baseline: 100     # 기준선 (100 = 중립)
      min_nci: 0
      max_nci: 100

  service_production:
    name: 서비스업생산지수
    weight: 0.20
    source: kosis
    normalization:
      baseline: 100
      min_nci: 0
      max_nci: 100

  news_sentiment:
    name: 뉴스감성지수
    weight: 0.15
    source: ai_analysis
    normalization:
      baseline: 0       # -1 ~ +1 범위
      min_nci: 0
      max_nci: 100

# 독립 서브지수 (overall NCI 계산에 포함되지 않음, 별도 표시용)
supplemental_indices:
  food_price_pressure:
    name: 식자재가격압력지수
    name_en: Food Price Pressure Index
    source: kamis
    description: "도매가격 상승 압력 지수 — 높을수록 원가 부담 증가 (0=저압, 100=고압)"
    normalization:
      direction: inverse      # 가격 상승 → 압력 상승
      baseline_yoy: 0.0       # 전년동기비 0% = 50점
      scale_factor: 5.0       # ±5% 변동 = ±25점
      min_nci: 0
      max_nci: 100

  consumer_spending_power:
    name: 실질소비여력지수
    name_en: Consumer Spending Power Index
    source: bok_kosis_combined
    description: "CSI + 소매판매 + 물가 복합 — 소비자 실질 구매력 (0=위축, 100=활발)"
    normalization:
      baseline: 50
      min_nci: 0
      max_nci: 100

# ISI 산출 설정
isi_settings:
  baseline: 50           # 경기 중립 기준선
  news_weight: 0.3       # 뉴스 감성 반영 비중
  statistics_weight: 0.7  # 통계 지표 반영 비중
  smoothing: 0.3         # 지수 이동평균 계수 (0=이전값유지, 1=새값반영)
