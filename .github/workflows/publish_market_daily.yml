name: 유통정보 일일 업데이트

on:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = KST 07:00 매일
  workflow_dispatch:         # 수동 트리거 지원

jobs:
  publish-market:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Set target date (KST)
        run: echo "TARGET_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Run market daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KAMIS_API_KEY: ${{ secrets.KAMIS_API_KEY }}
          KAMIS_CERT_ID: ${{ secrets.KAMIS_CERT_ID }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
        run: |
          python -m pipeline.main \
            --content-type market-daily \
            --date ${{ env.TARGET_DATE }} \
            --no-push

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify
        working-directory: site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/public --project-name=neosolution

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/content/ko/distribution/daily/ data/
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            git commit -m "Market daily: ${{ env.TARGET_DATE }}"
            git push
          fi

      - name: Notify failure via Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ [NeoSolution] 유통정보 일일 업데이트 실패 (${{ env.TARGET_DATE }})" \
            -d parse_mode=Markdown || true
