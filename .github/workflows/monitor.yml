name: Daily Monitor

on:
  schedule:
    # 매일 KST 12:00 = UTC 03:00
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install boto3 requests

      - name: Check R2 storage
        if: ${{ !cancelled() }}
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          python -c "
          from pipeline.monitor import check_r2_usage
          check_r2_usage()
          " 2>/dev/null || echo "R2 check skipped"

      - name: Health check
        run: |
          # 사이트 응답 확인
          curl -sf https://neosolution.co.kr/ > /dev/null && echo "Site OK" || echo "Site DOWN"
